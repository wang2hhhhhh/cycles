<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jun — Work</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <a href="index.html" class="site-name">Jun</a>
      <div class="sidebar-nav">
        <a href="index.html" class="active">Work</a>
        <a href="info.html">Info</a>
      </div>
      <div class="project-list">
        <div class="project-row active" data-project="cycles">
          <span class="project-name">Cycles</span>
          <span class="project-year">2024</span>
        </div>
      </div>
    </aside>

    <main class="main-content" id="project-content"></main>
  </div>

  <script>
    const projects = {
      cycles: {
        title: "Cycles",
        year: "2024",
        series: [
          {
            name: "Relationship",
            photos: [
              "projects/cycles/photos-web/relationship/DSCF1830.JPG",
              "projects/cycles/photos-web/relationship/DSCF2208.JPG",
              "projects/cycles/photos-web/relationship/DSCF2221.JPG",
              "projects/cycles/photos-web/relationship/DSCF2381.JPG",
              "projects/cycles/photos-web/relationship/DSCF2690.jpeg"
            ]
          },
          {
            name: "Sun",
            photos: [
              "projects/cycles/photos-web/sun/DSCF3459.JPG",
              "projects/cycles/photos-web/sun/DSCF3498.JPG",
              "projects/cycles/photos-web/sun/DSCF3522.JPG",
              "projects/cycles/photos-web/sun/DSCF3528.JPG"
            ]
          }
        ]
      }
    };

    function renderProject(key) {
      const project = projects[key];
      const container = document.getElementById('project-content');
      container.innerHTML = '';

      project.series.forEach(series => {
        const section = document.createElement('div');
        section.className = 'series-section';

        const label = document.createElement('p');
        label.className = 'series-label';
        label.textContent = series.name;
        section.appendChild(label);

        const wrapper = document.createElement('div');
        wrapper.className = 'carousel-wrapper';

        const track = document.createElement('div');
        track.className = 'carousel-track';

        series.photos.forEach(src => {
          const img = document.createElement('img');
          img.src = src;
          img.alt = series.name;
          img.style.height = '300px';
          img.style.width = 'auto';
          img.style.flexShrink = '0';
          track.appendChild(img);
        });

        const arrow = document.createElement('button');
        arrow.className = 'carousel-arrow';
        arrow.innerHTML = '&#8594;';
        arrow.addEventListener('click', () => {
          const maxScroll = track.scrollWidth - track.clientWidth;
          if (track.scrollLeft >= maxScroll - 1) {
            track.scrollTo({ left: 0, behavior: 'smooth' });
          } else {
            track.scrollBy({ left: 320, behavior: 'smooth' });
          }
        });

        wrapper.appendChild(track);
        wrapper.appendChild(arrow);
        section.appendChild(wrapper);
        container.appendChild(section);
      });
    }

    document.querySelectorAll('.project-row').forEach(row => {
      row.addEventListener('click', () => {
        document.querySelectorAll('.project-row').forEach(r => r.classList.remove('active'));
        row.classList.add('active');
        renderProject(row.dataset.project);
      });
    });

    // Auto-render cycles on load
    renderProject('cycles');
  </script>
</body>
</html>
