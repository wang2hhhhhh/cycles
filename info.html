<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jun — Info</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <a href="index.html" class="site-name">Jun</a>
      <div class="sidebar-nav">
        <a href="index.html">Work</a>
        <a href="info.html" class="active">Info</a>
      </div>
      <div class="project-list">
        <div class="project-row" data-project="cycles">
          <span class="project-name">Cycles</span>
          <span class="project-year">2024</span>
        </div>
      </div>
    </aside>

    <main class="info-content">
      <div class="info-text">
        <h1 class="info-name">Jun</h1>
        <p class="info-bio">[Placeholder bio text. A few sentences about who you are, what you do, and what you're interested in. Keep it brief and honest.]</p>
        <hr class="info-divider">
        <p class="info-section-label">Contact</p>
        <div class="contact-row">
          <span class="contact-label">Email</span>
          <span class="contact-value">[email@example.com]</span>
        </div>
        <div class="contact-row">
          <span class="contact-label">Instagram</span>
          <span class="contact-value">[@handle]</span>
        </div>
        <div class="contact-row">
          <span class="contact-label">Location</span>
          <span class="contact-value">[City, Country]</span>
        </div>
      </div>
    </main>
  </div>

  <script>
    document.querySelectorAll('.project-row').forEach(row => {
      row.addEventListener('click', () => {
        window.location.href = 'index.html';
      });
    });
  </script>
</body>
</html>
