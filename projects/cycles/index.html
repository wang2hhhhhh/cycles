<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cycles</title>
  <link rel="stylesheet" href="../../style.css">
  <style>
    .project-header {
      padding: 48px 48px 36px;
    }

    .project-title {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #111;
      margin-bottom: 16px;
    }

    .statement {
      font-size: 12px;
      line-height: 1.9;
      color: #888;
      max-width: 520px;
    }

    main {
      padding-bottom: 80px;
    }

    .group {
      margin-bottom: 60px;
    }

    .group-label {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      padding: 0 48px 12px;
    }

    .photo-row {
      display: flex;
      overflow-x: auto;
      height: 60vh;
      gap: 4px;
      padding: 0 48px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .photo-row::-webkit-scrollbar {
      display: none;
    }

    .photo-row img {
      height: 100%;
      width: auto;
      display: block;
      flex-shrink: 0;
      object-fit: cover;
    }

  <nav>
    <a href="../../index.html" class="site-name">Jun</a>

  </nav>
  <div class="project-header">
